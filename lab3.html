<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>three.js webgl - геометрические фигуры</title>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <link type="text/css" rel="stylesheet" href="https://threejs.org/examples/main.css">
</head>
<body>
    <div id="info">
        Модель помещения (текстуры с GitHub)
    </div>

    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://threejs.org/build/three.module.js",
                "three/addons/": "https://threejs.org/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

        var camera, scene, renderer;
        var controls;
        var ambientLight, light;
        let object;
        
        init();
        animate();

        function init() {
            var container = document.createElement('div');
            document.body.appendChild(container);

            // CAMERA
            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 1, 80000);

            // LIGHTS
            ambientLight = new THREE.AmbientLight(0x333333, 50);
            light = new THREE.DirectionalLight(0xFFFFFF, 1.0);
            light.position.set(1, 1, 1);

            // RENDERER
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            // EVENTS
            window.addEventListener('resize', onWindowResize, false);

            // CONTROLS
            controls = new OrbitControls(camera, renderer.domElement);
            controls.addEventListener('change', render);
            controls.enableZoom = true;
            controls.zoomSpeed = 0.5;
            controls.minDistance = 500;
            controls.maxDistance = 5000;
            controls.enableDamping = true;
            camera.position.set(0, -500, 2900);
            controls.target.set(50, 0, 50);

            // SCENE
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xD3D3D3);
            scene.add(ambientLight);
            scene.add(light);

            // ========== СТЕНЫ И ПОЛ С ВАШЕГО GITHUB ==========
            var materials = [];
            var textureLoader = new THREE.TextureLoader();

            // Ваш репозиторий
            const repoOwner = "sadretdinovTI";
            const repoName = "PIS-Vildanov-Lab3";
            const branch = "main";

            // Соответствие файлов стенам (порядок для BoxGeometry: right, left, up, down, front, back)
            // Стена 1 (правая) - wall1.jpg
            // Стена 2 (левая) - wall2.jpg
            // Стена 3 (потолок) - wall3.jpg
            // Стена 4 (пол) - floor.jpg
            // Стена 5 (передняя) - wall4.png
            // Стена 6 (задняя) - wall3.jpg (повторяем wall3 для задней стены, либо укажите другой файл)
            
            const textureFiles = [
                'wall1.jpg', // правая стена (x+) - Стена 1
                'wall2.jpg', // левая стена (x-) - Стена 2
                'wall3.jpg', // потолок (y+) - Стена 3
                'floor.jpg', // пол (y-) - Пол
                'wall4.png', // передняя стена (z+) - Стена 4
                'wall3.jpg'  // задняя стена (z-) - используем wall3.jpg как временное решение
            ];

            for (let i = 0; i < 6; i++) {
                const textureUrl = `https://raw.githubusercontent.com/${repoOwner}/${repoName}/${branch}/${textureFiles[i]}`;
                
                const texture = textureLoader.load(
                    textureUrl,
                    () => console.log(`✅ Загружена текстура: ${textureFiles[i]}`),
                    undefined,
                    (err) => console.error(`❌ Ошибка загрузки ${textureFiles[i]}:`, err)
                );
                
                // Настройки текстур (как в исходном коде)
                texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
                texture.repeat.x = -1; // отражение по X
                
                // Специальные настройки для потолка и пола
                if (i === 2 || i === 3) { // потолок и пол
                    texture.repeat.set(3, 3);
                }
                if (i === 2) { // потолок
                    texture.offset.set(0.05, 0.2);
                }
                
                const material = new THREE.MeshPhongMaterial({ 
                    map: texture, 
                    side: THREE.BackSide 
                });
                
                materials.push(material);
            }

            // Создаем комнату (большой куб)
            var geometry = new THREE.BoxGeometry(5000, 5000, 5000);
            var roomCube = new THREE.Mesh(geometry, materials);
            roomCube.position.y = 100;
            scene.add(roomCube);
            // ========== КОНЕЦ СТЕНЫ/ПОЛ ==========

            // ========== МОДЕЛЬ ЧЕЛОВЕКА ==========
            const onProgress = function(xhr) {
                if (xhr.lengthComputable) {
                    const percentComplete = xhr.loaded / xhr.total * 100;
                    console.log(percentComplete.toFixed(2) + '% downloaded');
                }
            };

            new MTLLoader()
                .setPath('https://threejs.org/examples/models/obj/male02/')
                .load('male02.mtl', function(materials) {
                    materials.preload();

                    new OBJLoader()
                        .setMaterials(materials)
                        .setPath('https://threejs.org/examples/models/obj/male02/')
                        .load('male02.obj', function(object) {
                            object.position.set(-1500, -2400, -200);
                            object.rotation.y = Math.PI / 2;
                            object.scale.setScalar(10);
                            scene.add(object);
                        }, onProgress);
                });
            // ========== КОНЕЦ МОДЕЛИ ==========
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(500);
            render();
        }

        function render() {
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
