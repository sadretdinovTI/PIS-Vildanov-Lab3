<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>three.js webgl - Комната со всеми текстурами</title>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <link type="text/css" rel="stylesheet" href="https://threejs.org/examples/main.css">
    <style>
        #info { background: rgba(0,0,0,0.7); color: white; padding: 8px 16px; border-radius: 20px; }
        #status { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.5); color: #0f0; padding: 4px 12px; border-radius: 12px; font-size: 12px; }
    </style>
</head>
<body>
    <div id="info">Модель помещения (все текстуры с GitHub)</div>
    <div id="status">⏳ Загрузка текстур...</div>

    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://threejs.org/build/three.module.js",
                "three/addons/": "https://threejs.org/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

        // --- Инициализация ---
        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 1, 80000);
        camera.position.set(0, -500, 2900);
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xD3D3D3);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- Освещение ---
        const ambientLight = new THREE.AmbientLight(0x333333, 50);
        const light = new THREE.DirectionalLight(0xFFFFFF, 1.0);
        light.position.set(1, 1, 1);
        scene.add(ambientLight, light);

        // --- Контролы ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableZoom = true;
        controls.zoomSpeed = 0.5;
        controls.minDistance = 500;
        controls.maxDistance = 5000;
        controls.enableDamping = true;
        controls.target.set(50, 0, 50);
        controls.addEventListener('change', () => renderer.render(scene, camera));

        // --- Загрузка текстур с GitHub ---
        const repoOwner = "sadretdinovTI";
        const repoName = "PIS-Vildanov-Lab3";
        const branch = "main";
        const textureLoader = new THREE.TextureLoader();
        
        // ТОЧНЫЙ порядок материалов для BoxGeometry (как требует Three.js):
        // 0: правая стена (x+)  → wall1.jpg
        // 1: левая стена (x-)   → wall2.jpg
        // 2: верх (y+)          → potolok.jpg
        // 3: низ (y-)           → floor.jpg  (ПОЛ! Этот файл есть в репозитории)
        // 4: перед (z+)         → wall4.png
        // 5: зад (z-)           → wall3.jpg
        
        const textureConfig = [
            { name: 'wall1.jpg', type: 'right' },
            { name: 'wall2.jpg', type: 'left' },
            { name: 'potolok.jpg', type: 'top' },
            { name: 'floor.jpg', type: 'bottom' },  // Пол подтвержден!
            { name: 'wall4.png', type: 'front' },
            { name: 'wall3.jpg', type: 'back' }
        ];

        // Счетчик загруженных текстур для статуса
        let loadedCount = 0;
        const totalTextures = 6;
        const statusDiv = document.getElementById('status');

        const materials = [];
        
        textureConfig.forEach((config, index) => {
            const url = `https://raw.githubusercontent.com/${repoOwner}/${repoName}/${branch}/${config.name}`;
            
            const texture = textureLoader.load(
                url,
                () => {
                    loadedCount++;
                    statusDiv.innerHTML = `✅ Загружено ${loadedCount}/${totalTextures}: ${config.name}`;
                    if (loadedCount === totalTextures) {
                        statusDiv.style.backgroundColor = 'rgba(0,80,0,0.7)';
                        statusDiv.style.color = '#fff';
                    }
                },
                undefined,
                (err) => {
                    console.error(`❌ Ошибка загрузки ${config.name}:`, err);
                    statusDiv.innerHTML = `⚠️ Ошибка: ${config.name} не загружен!`;
                }
            );
            
            // Настройка текстур
            texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.x = -1;
            
            // Особые настройки для пола и потолка
            if (index === 2 || index === 3) { // потолок (2) и пол (3)
                texture.repeat.set(3, 3);
            }
            if (index === 2) { // потолок
                texture.offset.set(0.05, 0.2);
            }
            
            const material = new THREE.MeshPhongMaterial({ 
                map: texture, 
                side: THREE.BackSide,
                shininess: 10
            });
            
            materials[index] = material;
        });

        // --- Создание комнаты ---
        const geometry = new THREE.BoxGeometry(5000, 5000, 5000);
        const room = new THREE.Mesh(geometry, materials);
        room.position.y = 100;
        scene.add(room);

        // --- Загрузка модели человека ---
        new MTLLoader()
            .setPath('https://threejs.org/examples/models/obj/male02/')
            .load('male02.mtl', (materials) => {
                materials.preload();
                new OBJLoader()
                    .setMaterials(materials)
                    .setPath('https://threejs.org/examples/models/obj/male02/')
                    .load('male02.obj', (obj) => {
                        obj.position.set(-1500, -2400, -200);
                        obj.rotation.y = Math.PI / 2;
                        obj.scale.setScalar(10);
                        scene.add(obj);
                        console.log("✅ Модель человека загружена");
                    });
            });

        // --- Обработка событий ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Анимация ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();
    </script>
</body>
</html>
